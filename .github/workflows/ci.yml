name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Run shellcheck on .sh files
        run: shellcheck bin/*.sh

  test:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Check installation script is executable
        run: bash bin/install.sh -c
      - name: Test statusline output with sample input
        run: echo '{"cwd":"/home/user/test","display_name":"Claude Sonnet 4.6","used_percentage":30}' | bash bin/statusline.sh
